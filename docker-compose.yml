version: '3.9'

services:
  # ─── MongoDB ───────────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: 10min_mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: groceerynewstore
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', 'db.adminCommand("ping")']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend (Node/Express) ─────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: 10min_backend
    restart: unless-stopped
    ports:
      - '5000:5000'
    env_file:
      - ./backend/.env
    environment:
      MONGODB_URI: mongodb://mongo:27017/groceerynewstore
      NODE_ENV: production
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/uploads
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:5000/']
      interval: 15s
      timeout: 5s
      retries: 3

  # ─── Frontend (React/Vite) ──────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: 10min_frontend
    restart: unless-stopped
    ports:
      - '3000:80'
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: http://backend:5000/api

  # ─── Nginx Reverse Proxy (Optional) ────────────────────────────
  # nginx:
  #   image: nginx:alpine
  #   container_name: 10min_nginx
  #   ports:
  #     - '80:80'
  #     - '443:443'
  #   volumes:
  #     - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./nginx/certs:/etc/nginx/certs:ro
  #   depends_on:
  #     - backend
  #     - frontend

volumes:
  mongo_data:
    driver: local
